<body>
    <h1>Todo list</h1>
    <div>
    <input id="input"><br>
    <button onclick="add()">Add Task</button>
    <ol id="tasklist">
        <li>Tense learning
            
            <button onclick="completetask(event)">Completed</button>
            <button onclick="pendingtask(event)">Pending</button>
            <button onclick="deletetask(event)">Delete</button>
        
    </li>

    </ol>
    
    <p id="pendingCount">Pending count: 0 </p>
    <p id="completedCount">Completed count: 0 </p>
</div>

</body>
